<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Urban Parallax</title>
  <link rel="icon" href="images/site/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/fonts.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-heading: 'Oswald', 'Impact', sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
      --accent: #C4553A;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(155deg, #0D0D0D 0%, #1C0C08 35%, #2A1205 55%, #1a0e08 75%, #0D0D0D 100%);
      overflow: hidden;
      position: relative;
    }

    /* Atmospheric blobs */
    .login-blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
    }
    .login-blob--1 {
      width: 500px; height: 500px;
      top: -120px; left: -100px;
      background: radial-gradient(circle, rgba(196,85,58,0.18) 0%, transparent 70%);
      filter: blur(60px);
    }
    .login-blob--2 {
      width: 400px; height: 400px;
      bottom: -100px; right: -60px;
      background: radial-gradient(circle, rgba(196,85,58,0.12) 0%, transparent 70%);
      filter: blur(50px);
    }
    .login-blob--3 {
      width: 250px; height: 250px;
      top: 40%; left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(160,70,40,0.08) 0%, transparent 70%);
      filter: blur(40px);
    }

    /* Main container */
    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 360px;
      padding: 0 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Logo mark */
    .login-mark {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 18px;
    }
    .login-rect {
      display: block;
      width: 14px;
    }
    .login-rect--a {
      height: 36px;
      background: #FFFFFF;
    }
    .login-rect--b {
      height: 36px;
      background: var(--accent);
      margin-top: 12px;
    }

    /* Wordmark */
    .login-wordmark {
      font-family: var(--font-heading);
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #FFFFFF;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 14px;
    }

    /* Subtitle */
    .login-subtitle {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 44px;
    }

    /* Form */
    .login-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-form input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #fff;
      font-family: var(--font-mono);
      font-size: 14px;
      letter-spacing: 0.02em;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-form input::placeholder {
      color: rgba(255,255,255,0.3);
    }
    .login-form input:focus {
      border-color: rgba(196,85,58,0.6);
      background: rgba(255,255,255,0.08);
    }

    .login-form button {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    .login-form button:hover {
      background: #d4634a;
    }
    .login-form button:active {
      transform: scale(0.98);
    }

    /* Error / status messages */
    .login-error {
      font-family: var(--font-mono);
      font-size: 10px;
      color: #e8735e;
      letter-spacing: 0.08em;
      text-align: center;
      margin-top: 6px;
    }

    .login-sent {
      font-family: var(--font-mono);
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      letter-spacing: 0.04em;
      text-align: center;
    }
    .login-sent strong {
      color: rgba(255,255,255,0.8);
    }

    /* Forgot password link */
    .login-forgot {
      margin-top: 16px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
    }
    .login-forgot a {
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.2s;
    }
    .login-forgot a:hover {
      color: rgba(255,255,255,0.7);
    }

    /* Password ok message */
    .login-ok {
      font-family: var(--font-mono);
      font-size: 11px;
      color: #6dba6d;
      letter-spacing: 0.04em;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Atmospheric background blobs -->
  <div class="login-blob login-blob--1"></div>
  <div class="login-blob login-blob--2"></div>
  <div class="login-blob login-blob--3"></div>

  <div class="login-card">

    <!-- Logo -->
    <div class="login-mark" aria-hidden="true">
      <span class="login-rect login-rect--a"></span>
      <span class="login-rect login-rect--b"></span>
    </div>
    <div class="login-wordmark">URBAN<br>PARALLAX</div>
    <div class="login-subtitle">Admin &middot; Urban Parallax</div>

    <!-- ── Sign-in view ── -->
    <div id="view-form" style="width:100%">
      <form id="login-form" class="login-form">
        <input type="email" id="login-email" placeholder="Email address"
               autocomplete="email" spellcheck="false" required>
        <input type="password" id="login-password" placeholder="Password"
               autocomplete="current-password" required>
        <button type="submit">Sign in</button>
      </form>
      <p id="login-error" class="login-error" hidden>Incorrect email or password.</p>
      <p class="login-forgot">
        <a href="#" id="forgot-link">Forgot password?</a>
      </p>
    </div>

    <!-- ── Forgot-password view ── -->
    <div id="view-reset" hidden style="width:100%">
      <form id="reset-form" class="login-form">
        <input type="email" id="reset-email" placeholder="Email address"
               autocomplete="email" spellcheck="false" required>
        <button type="submit">Send reset link</button>
      </form>
      <p id="reset-error" class="login-error" hidden>Something went wrong.</p>
      <p class="login-forgot">
        <a href="#" id="back-link">Back to sign in</a>
      </p>
    </div>

    <!-- ── Reset link sent view ── -->
    <div id="view-reset-sent" hidden style="width:100%">
      <p class="login-sent">Check your inbox — we sent a reset link to <strong id="reset-sent-email"></strong>.</p>
      <p class="login-forgot" style="margin-top:16px">
        <a href="#" id="back-link-2">Back to sign in</a>
      </p>
    </div>

    <!-- ── Set new password view ── -->
    <div id="view-set-pw" hidden style="width:100%">
      <p class="login-subtitle" style="margin-bottom:24px">Choose a new password</p>
      <form id="set-pw-form" class="login-form">
        <input type="password" id="new-password" placeholder="New password"
               autocomplete="new-password" required minlength="6">
        <input type="password" id="confirm-password" placeholder="Confirm password"
               autocomplete="new-password" required minlength="6">
        <button type="submit">Save password</button>
      </form>
      <p id="set-pw-error" class="login-error" hidden></p>
      <p id="set-pw-ok" class="login-ok" hidden>Password saved! Redirecting&hellip;</p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL      = 'https://qqoxqkpilcebvrscgvmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxb3hxa3BpbGNlYnZyc2Nndm1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NDUzNTYsImV4cCI6MjA5MDIyMTM1Nn0.intBH-jneA_gsNWEviMemYWPZMfvL9pZ0TpvXTO19mw';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // If already logged in, skip to admin
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) location.replace('/admin.html');
    });

    // ── Helpers ──────────────────────────────────────────────────────────────
    function showView(id) {
      ['view-form', 'view-reset', 'view-reset-sent', 'view-set-pw'].forEach(v => {
        document.getElementById(v).hidden = v !== id;
      });
    }

    // ── Detect recovery (password reset) token ──────────────────────────────
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        showView('view-set-pw');
      }
    });

    // ── Set new password form ────────────────────────────────────────────────
    document.getElementById('set-pw-form').addEventListener('submit', async e => {
      e.preventDefault();
      const pw      = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const errEl   = document.getElementById('set-pw-error');
      errEl.hidden  = true;

      if (pw !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.hidden = false;
        return;
      }

      const { error } = await sb.auth.updateUser({ password: pw });
      if (error) {
        errEl.textContent = error.message;
        errEl.hidden = false;
        return;
      }

      document.getElementById('set-pw-ok').hidden = false;
      document.getElementById('set-pw-form').hidden = true;
      setTimeout(() => location.replace('/admin.html'), 1500);
    });

    // ── Sign-in ──────────────────────────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl    = document.getElementById('login-error');
      errEl.hidden   = true;

      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.hidden = false;
        return;
      }
      location.replace('/admin.html');
    });

    // ── Forgot-password toggle ───────────────────────────────────────────────
    document.getElementById('forgot-link').addEventListener('click', e => {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      if (email) document.getElementById('reset-email').value = email;
      showView('view-reset');
    });

    document.getElementById('back-link').addEventListener('click', e => {
      e.preventDefault();
      showView('view-form');
    });

    document.getElementById('back-link-2').addEventListener('click', e => {
      e.preventDefault();
      showView('view-form');
    });

    // ── Password reset ───────────────────────────────────────────────────────
    document.getElementById('reset-form').addEventListener('submit', async e => {
      e.preventDefault();
      const email  = document.getElementById('reset-email').value.trim();
      const errEl  = document.getElementById('reset-error');
      errEl.hidden = true;

      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/login.html',
      });

      if (error) {
        errEl.hidden = false;
        return;
      }

      document.getElementById('reset-sent-email').textContent = email;
      showView('view-reset-sent');
    });
  </script>
</body>
</html>
