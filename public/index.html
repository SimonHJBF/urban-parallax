<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban Parallax — Two cities. One lens.</title>
  <meta name="description" content="A visual research blog comparing urban spaces across cities. Two columns. Two cities. One lens.">
  <link rel="icon" href="images/site/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/main.css">
  <script src="js/theme.js"></script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-brand">
        <h1 class="site-title">URBAN PARALLAX</h1>
        <span class="site-tagline">two cities — one lens</span>
      </a>

      <div class="colour-selector">

        <button class="colour-pill" data-family="dark" onclick="handlePillClick(this)">
          <span class="pill-dot" style="background:#888880"></span>
          <span class="pill-label">Dark</span>
        </button>

        <button class="colour-pill" data-family="light" onclick="handlePillClick(this)">
          <span class="pill-dot" style="background:#C8C5BE;border:1px solid #aaa"></span>
          <span class="pill-label">Light</span>
        </button>

        <button class="colour-pill" data-family="red" onclick="handlePillClick(this)">
          <span class="pill-dot" style="background:#FF2222"></span>
          <span class="pill-label">Red</span>
        </button>

        <button class="colour-pill" data-family="orange" onclick="handlePillClick(this)">
          <span class="pill-dot" style="background:#FF8C00"></span>
          <span class="pill-label">Orange</span>
        </button>

        <button class="colour-pill" data-family="green" onclick="handlePillClick(this)">
          <span class="pill-dot" style="background:#00DD55"></span>
          <span class="pill-label">Green</span>
        </button>

        <button class="colour-pill" data-family="blue" onclick="handlePillClick(this)">
          <span class="pill-dot" style="background:#2255FF"></span>
          <span class="pill-label">Blue</span>
        </button>

        <div class="ve-sep"></div>

        <div class="ve-standalone">
          <button class="ve-opt" data-v="earth">Earth</button>
          <button class="ve-opt" data-v="vivid">Vivid</button>
        </div>

      </div>

      <nav class="header-nav">
        <a href="about.html">About</a>
        <a href="admin.html">Admin</a>
      </nav>
    </div>
  </header>

  <main id="feed" class="feed" aria-label="Comparisons feed">
    <div class="feed-loading" aria-live="polite">Loading comparisons…</div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-mark">Urban Parallax</span>
      <span class="footer-credit">Rotterdam × São Paulo</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="js/blur-engine.js"></script>
  <script src="js/app.js"></script>
  <script>
    (() => {
      const header = document.querySelector('.site-header');
      window.addEventListener('scroll', () => {
        header.classList.toggle('scrolled', window.scrollY > 40);
      }, { passive: true });
    })();
  </script>
</body>
</html>
