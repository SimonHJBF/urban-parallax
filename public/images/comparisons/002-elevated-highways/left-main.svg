<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#E0DCD4"/>
  <rect width="800" height="300" fill="#CCCAC4"/>

  <!-- Hofbogen viaduct — repeating brick arches -->
  <!-- Arch 1 -->
  <path d="M0,300 L0,180 Q80,120 160,180 L160,300 Z" fill="#B8A898"/>
  <path d="M10,300 L10,186 Q80,132 150,186 L150,300 Z" fill="#C4B8A4" stroke="#A89888" stroke-width="1"/>
  <!-- Arch opening (shop inside) -->
  <path d="M20,300 L20,190 Q80,145 140,190 L140,300 Z" fill="#2C2820"/>
  <!-- Warm light from shop -->
  <path d="M30,300 L30,195 Q80,158 130,195 L130,300 Z" fill="#3C3428" opacity="0.7"/>

  <!-- Arch 2 -->
  <path d="M155,300 L155,180 Q235,120 315,180 L315,300 Z" fill="#B8A898"/>
  <path d="M165,300 L165,186 Q235,132 305,186 L305,300 Z" fill="#C4B8A4" stroke="#A89888" stroke-width="1"/>
  <path d="M175,300 L175,190 Q235,145 295,190 L295,300 Z" fill="#2C2820"/>
  <rect x="185" y="240" width="100" height="60" fill="#3A3028" opacity="0.6"/>
  <!-- Shop sign rough -->
  <rect x="195" y="245" width="80" height="14" fill="#4A3C2C" opacity="0.8"/>

  <!-- Arch 3 -->
  <path d="M310,300 L310,180 Q390,120 470,180 L470,300 Z" fill="#B8A898"/>
  <path d="M320,300 L320,186 Q390,132 460,186 L460,300 Z" fill="#C4B8A4" stroke="#A89888" stroke-width="1"/>
  <path d="M330,300 L330,190 Q390,145 450,190 L450,300 Z" fill="#2C2820"/>
  <!-- Bike workshop sign -->
  <rect x="340" y="245" width="100" height="50" fill="#38302A" opacity="0.7"/>

  <!-- Arch 4 (partial) -->
  <path d="M465,300 L465,180 Q545,120 625,180 L625,300 Z" fill="#B8A898"/>
  <path d="M475,300 L475,186 Q545,132 615,186 L615,300 Z" fill="#C4B8A4" stroke="#A89888" stroke-width="1"/>
  <path d="M485,300 L485,190 Q545,145 605,190 L605,300 Z" fill="#2C2820"/>

  <!-- Arch 5 (partial) -->
  <path d="M620,300 L620,180 Q700,120 780,180 L780,300 Z" fill="#B8A898"/>
  <path d="M630,300 L630,186 Q700,132 770,186 L770,300 Z" fill="#C4B8A4" stroke="#A89888" stroke-width="1"/>
  <path d="M640,300 L640,190 Q700,145 760,190 L760,300 Z" fill="#2C2820"/>

  <!-- Viaduct top / railway deck -->
  <rect x="0" y="168" width="800" height="20" fill="#A89888"/>
  <rect x="0" y="162" width="800" height="10" fill="#B0A090"/>
  <!-- Greenery on top (rooftop farm) -->
  <rect x="0" y="155" width="800" height="12" fill="#8A9C78" opacity="0.8"/>
  <rect x="20" y="148" width="760" height="10" fill="#7A9068" opacity="0.6"/>
  <!-- Plant shapes -->
  <ellipse cx="80"  cy="152" rx="25" ry="10" fill="#8A9C78" opacity="0.9"/>
  <ellipse cx="180" cy="150" rx="30" ry="12" fill="#7C9070" opacity="0.9"/>
  <ellipse cx="290" cy="151" rx="20" ry="9"  fill="#8A9C78" opacity="0.9"/>
  <ellipse cx="420" cy="149" rx="35" ry="13" fill="#7C9070" opacity="0.9"/>
  <ellipse cx="550" cy="152" rx="25" ry="10" fill="#8A9C78" opacity="0.9"/>
  <ellipse cx="660" cy="150" rx="30" ry="11" fill="#7C9070" opacity="0.9"/>
  <ellipse cx="760" cy="153" rx="20" ry="9"  fill="#8A9C78" opacity="0.9"/>

  <!-- Street below -->
  <rect y="300" width="800" height="200" fill="#C8C4BC"/>
  <!-- Cobblestones hint -->
  <rect y="300" width="800" height="3" fill="#B0ACA4"/>

  <!-- Pedestrians -->
  <rect x="200" y="370" width="6" height="22" fill="#8C8880"/>
  <ellipse cx="203" cy="367" rx="5" ry="5" fill="#8C8880"/>
  <rect x="350" y="360" width="6" height="24" fill="#8C8880"/>
  <ellipse cx="353" cy="357" rx="5" ry="5" fill="#8C8880"/>

</svg>
