<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#D8D4CC"/>
  <rect width="800" height="260" fill="#C8C4BC"/>

  <!-- Minhocão elevated highway profile view -->
  <!-- Support columns -->
  <rect x="40"  y="240" width="18" height="260" fill="#9C9890"/>
  <rect x="148" y="240" width="18" height="260" fill="#9C9890"/>
  <rect x="256" y="240" width="18" height="260" fill="#9C9890"/>
  <rect x="364" y="240" width="18" height="260" fill="#9C9890"/>
  <rect x="472" y="240" width="18" height="260" fill="#9C9890"/>
  <rect x="580" y="240" width="18" height="260" fill="#9C9890"/>
  <rect x="688" y="240" width="18" height="260" fill="#9C9890"/>

  <!-- Column cap brackets -->
  <rect x="30"  y="236" width="38" height="10" fill="#888480"/>
  <rect x="138" y="236" width="38" height="10" fill="#888480"/>
  <rect x="246" y="236" width="38" height="10" fill="#888480"/>
  <rect x="354" y="236" width="38" height="10" fill="#888480"/>
  <rect x="462" y="236" width="38" height="10" fill="#888480"/>
  <rect x="570" y="236" width="38" height="10" fill="#888480"/>
  <rect x="678" y="236" width="38" height="10" fill="#888480"/>

  <!-- Highway deck -->
  <rect x="0" y="210" width="800" height="30" fill="#929088"/>
  <rect x="0" y="207" width="800" height="6" fill="#7C7870"/>
  <!-- Guardrails -->
  <rect x="0" y="204" width="800" height="5" fill="#888480"/>
  <rect x="0" y="236" width="800" height="3" fill="#888480"/>

  <!-- People on weekend (the park day) -->
  <!-- Jogger -->
  <rect x="100" y="212" width="5" height="18" fill="#6C6860"/>
  <ellipse cx="102" cy="209" rx="4" ry="5" fill="#6C6860"/>
  <!-- Child on bike -->
  <rect x="260" y="215" width="4" height="15" fill="#7C7870"/>
  <ellipse cx="262" cy="212" rx="4" ry="4" fill="#7C7870"/>
  <circle cx="256" cy="228" r="5" fill="none" stroke="#7C7870" stroke-width="2"/>
  <circle cx="270" cy="228" r="5" fill="none" stroke="#7C7870" stroke-width="2"/>
  <!-- Couple walking -->
  <rect x="440" y="213" width="5" height="18" fill="#6C6860"/>
  <ellipse cx="442" cy="210" rx="4" ry="5" fill="#6C6860"/>
  <rect x="452" y="214" width="5" height="17" fill="#6C6860"/>
  <ellipse cx="454" cy="211" rx="4" ry="4" fill="#6C6860"/>

  <!-- São Paulo building skyline behind -->
  <!-- Assorted heights, dense -->
  <rect x="0"   y="80"  width="30" height="130" fill="#ACA8A0"/>
  <rect x="35"  y="50"  width="45" height="160" fill="#B4B0A8"/>
  <rect x="85"  y="90"  width="35" height="120" fill="#A8A49C"/>
  <rect x="130" y="40"  width="60" height="170" fill="#B0ACA4"/>
  <rect x="200" y="70"  width="40" height="140" fill="#ACA8A0"/>
  <rect x="250" y="100" width="30" height="110" fill="#A4A09A"/>
  <rect x="290" y="55"  width="55" height="155" fill="#B4B0A8"/>
  <rect x="360" y="85"  width="35" height="125" fill="#ACA8A0"/>
  <rect x="405" y="45"  width="50" height="165" fill="#B0ACA4"/>
  <rect x="465" y="75"  width="40" height="135" fill="#A8A4A0"/>
  <rect x="515" y="60"  width="60" height="150" fill="#B4B0A8"/>
  <rect x="585" y="90"  width="35" height="120" fill="#ACA8A0"/>
  <rect x="630" y="40"  width="55" height="170" fill="#B0ACA4"/>
  <rect x="695" y="70"  width="45" height="140" fill="#ACA8A0"/>
  <rect x="750" y="55"  width="50" height="155" fill="#B4B0A8"/>

  <!-- Ground street under highway -->
  <rect y="300" width="800" height="200" fill="#C0BCBA"/>
  <rect y="300" width="800" height="3" fill="#A8A4A0"/>

  <!-- Street traffic below -->
  <rect x="50"  y="340" width="55" height="22" rx="3" fill="#9C9890"/>
  <rect x="200" y="335" width="60" height="24" rx="3" fill="#929088"/>
  <rect x="400" y="338" width="50" height="22" rx="3" fill="#9C9890"/>
  <rect x="600" y="336" width="65" height="24" rx="3" fill="#929088"/>

  <!-- Apartment windows facing highway (intimate proximity) -->
  <g fill="#888480" opacity="0.6">
    <rect x="5"   y="100" width="8" height="10"/><rect x="18"  y="100" width="8" height="10"/>
    <rect x="5"   y="118" width="8" height="10"/><rect x="18"  y="118" width="8" height="10"/>
    <rect x="40"  y="60"  width="8" height="10"/><rect x="54"  y="60"  width="8" height="10"/>
    <rect x="40"  y="78"  width="8" height="10"/><rect x="54"  y="78"  width="8" height="10"/>
    <rect x="40"  y="96"  width="8" height="10"/><rect x="54"  y="96"  width="8" height="10"/>
  </g>

</svg>
