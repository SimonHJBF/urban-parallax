[build]
  publish = "public"
  command = "echo 'No build step — deploy public/ directly'"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=60"

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

# Proxy R2 image uploads through the Cloudflare Worker (PUT)
[[redirects]]
  from = "/r2-upload/*"
  to = "https://urbanparallax-worker.flatin94.workers.dev/r2-upload/:splat"
  status = 200
  force = true

# Always serve comparison images from R2 via Cloudflare Worker
[[redirects]]
  from = "/images/comparisons/*"
  to = "https://urbanparallax-worker.flatin94.workers.dev/images/comparisons/:splat"
  status = 200
  force = true
