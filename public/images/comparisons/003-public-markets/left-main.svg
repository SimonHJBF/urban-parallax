<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#DDD8D0"/>

  <!-- Markthal — the horseshoe arch -->
  <!-- Sky through glass ends -->
  <rect width="800" height="500" fill="#C8C4BC"/>

  <!-- The arch exterior -->
  <!-- Main arch outline — large horseshoe profile -->
  <path d="M80,500 L80,220 Q400,20 720,220 L720,500 Z" fill="#B4AEA4"/>
  <!-- Arch inner face — apartment facade grid -->
  <path d="M100,500 L100,230 Q400,50 700,230 L700,500 Z" fill="#C0B8AC"/>

  <!-- Apartment windows grid on arch flanks (stylised) -->
  <!-- Left flank windows -->
  <g fill="#888480" opacity="0.7">
    <rect x="105" y="240" width="12" height="10"/><rect x="122" y="240" width="12" height="10"/><rect x="139" y="240" width="12" height="10"/>
    <rect x="105" y="258" width="12" height="10"/><rect x="122" y="258" width="12" height="10"/><rect x="139" y="258" width="12" height="10"/>
    <rect x="105" y="276" width="12" height="10"/><rect x="122" y="276" width="12" height="10"/><rect x="139" y="276" width="12" height="10"/>
    <rect x="105" y="294" width="12" height="10"/><rect x="122" y="294" width="12" height="10"/><rect x="139" y="294" width="12" height="10"/>
    <rect x="108" y="312" width="12" height="10"/><rect x="125" y="312" width="12" height="10"/>
    <rect x="110" y="330" width="12" height="10"/><rect x="127" y="330" width="12" height="10"/>
    <rect x="112" y="348" width="12" height="10"/>
  </g>

  <!-- Right flank windows -->
  <g fill="#888480" opacity="0.7">
    <rect x="649" y="240" width="12" height="10"/><rect x="666" y="240" width="12" height="10"/><rect x="683" y="240" width="12" height="10"/>
    <rect x="649" y="258" width="12" height="10"/><rect x="666" y="258" width="12" height="10"/><rect x="683" y="258" width="12" height="10"/>
    <rect x="649" y="276" width="12" height="10"/><rect x="666" y="276" width="12" height="10"/><rect x="683" y="276" width="12" height="10"/>
    <rect x="649" y="294" width="12" height="10"/><rect x="666" y="294" width="12" height="10"/><rect x="683" y="294" width="12" height="10"/>
    <rect x="661" y="312" width="12" height="10"/><rect x="678" y="312" width="12" height="10"/>
    <rect x="661" y="330" width="12" height="10"/><rect x="678" y="330" width="12" height="10"/>
    <rect x="677" y="348" width="12" height="10"/>
  </g>

  <!-- Interior of arch — the mural ceiling (abstract colourful shapes) -->
  <path d="M110,500 L110,236 Q400,60 690,236 L690,500 Z" fill="#C4BEB4"/>
  <!-- Abstract mural suggestion (fruit / Dutch still life) -->
  <ellipse cx="220" cy="200" rx="30" ry="20" fill="#C4553A" opacity="0.5"/>
  <ellipse cx="300" cy="160" rx="25" ry="18" fill="#8A9C78" opacity="0.5"/>
  <ellipse cx="400" cy="130" rx="35" ry="22" fill="#D4A84C" opacity="0.5"/>
  <ellipse cx="500" cy="160" rx="28" ry="18" fill="#C4553A" opacity="0.4"/>
  <ellipse cx="580" cy="200" rx="30" ry="20" fill="#8A9C78" opacity="0.5"/>
  <ellipse cx="350" cy="150" rx="20" ry="15" fill="#7C5840" opacity="0.4"/>
  <ellipse cx="450" cy="148" rx="22" ry="14" fill="#D4A84C" opacity="0.4"/>

  <!-- Market floor -->
  <rect x="110" y="390" width="580" height="110" fill="#C8C2B8"/>
  <!-- Market stall awnings (simplified) -->
  <rect x="130" y="380" width="80" height="15" fill="#B8A088" opacity="0.9"/>
  <rect x="240" y="385" width="80" height="12" fill="#A89878" opacity="0.9"/>
  <rect x="360" y="378" width="80" height="14" fill="#B8A088" opacity="0.9"/>
  <rect x="470" y="383" width="80" height="13" fill="#A89878" opacity="0.9"/>
  <rect x="570" y="380" width="80" height="15" fill="#B8A088" opacity="0.9"/>

  <!-- Figures at stalls -->
  <rect x="160" y="395" width="5" height="18" fill="#7C7870"/>
  <rect x="280" y="398" width="5" height="18" fill="#7C7870"/>
  <rect x="400" y="392" width="5" height="18" fill="#7C7870"/>
  <rect x="500" y="396" width="5" height="18" fill="#7C7870"/>

  <!-- Glass facade line (front of building) -->
  <rect x="80" y="390" width="30" height="110" fill="#A8A49C"/>
  <rect x="690" y="390" width="30" height="110" fill="#A8A49C"/>

</svg>
