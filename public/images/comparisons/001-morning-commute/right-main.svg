<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#DDD8D0"/>
  <!-- Hazy sky -->
  <rect width="800" height="280" fill="#C8C2B8"/>

  <!-- Elevated highway structure -->
  <!-- Pillars -->
  <rect x="60"  y="280" width="22" height="220" fill="#A8A49C"/>
  <rect x="190" y="280" width="22" height="220" fill="#A8A49C"/>
  <rect x="320" y="280" width="22" height="220" fill="#A8A49C"/>
  <rect x="450" y="280" width="22" height="220" fill="#A8A49C"/>
  <rect x="580" y="280" width="22" height="220" fill="#A8A49C"/>
  <rect x="710" y="280" width="22" height="220" fill="#A8A49C"/>

  <!-- Highway deck -->
  <rect x="0" y="260" width="800" height="32" fill="#9C9890"/>
  <rect x="0" y="258" width="800" height="5" fill="#888480"/>
  <!-- Road markings -->
  <rect x="0"   y="267" width="60"  height="3" fill="#B0ACA4" opacity="0.7"/>
  <rect x="80"  y="267" width="60"  height="3" fill="#B0ACA4" opacity="0.7"/>
  <rect x="160" y="267" width="60"  height="3" fill="#B0ACA4" opacity="0.7"/>
  <rect x="240" y="267" width="60"  height="3" fill="#B0ACA4" opacity="0.7"/>
  <rect x="320" y="267" width="60"  height="3" fill="#B0ACA4" opacity="0.7"/>
  <rect x="400" y="267" width="60"  height="3" fill="#B0ACA4" opacity="0.7"/>
  <rect x="480" y="267" width="60"  height="3" fill="#B0ACA4" opacity="0.7"/>
  <rect x="560" y="267" width="60"  height="3" fill="#B0ACA4" opacity="0.7"/>
  <rect x="640" y="267" width="60"  height="3" fill="#B0ACA4" opacity="0.7"/>
  <rect x="720" y="267" width="80"  height="3" fill="#B0ACA4" opacity="0.7"/>

  <!-- Cars on highway (silhouettes) -->
  <rect x="80"  y="248" width="50" height="18" rx="3" fill="#8C8880"/>
  <rect x="220" y="248" width="60" height="18" rx="3" fill="#7C7870"/>
  <rect x="380" y="248" width="50" height="18" rx="3" fill="#8C8880"/>
  <rect x="500" y="248" width="55" height="18" rx="3" fill="#7C7870"/>
  <rect x="640" y="248" width="50" height="18" rx="3" fill="#8C8880"/>

  <!-- Motorcycles -->
  <rect x="170" y="252" width="20" height="12" rx="2" fill="#6C6860"/>
  <rect x="430" y="252" width="18" height="12" rx="2" fill="#6C6860"/>

  <!-- Under-highway life — São Paulo -->
  <!-- Ground level street -->
  <rect y="292" width="800" height="208" fill="#C4BEB4"/>
  <rect y="292" width="800" height="4" fill="#A8A49C"/>

  <!-- Street-level buildings -->
  <rect x="0"   y="200" width="55" height="92" fill="#B8B0A4"/>
  <rect x="100" y="210" width="80" height="82" fill="#C0B8AA"/>
  <rect x="210" y="190" width="100" height="102" fill="#B4ACA0"/>

  <!-- Tall residential towers behind highway -->
  <rect x="530" y="80"  width="40" height="180" fill="#B0ACA4"/>
  <rect x="580" y="110" width="35" height="150" fill="#A8A498"/>
  <rect x="625" y="95"  width="45" height="165" fill="#B4B0A8"/>
  <rect x="680" y="60"  width="50" height="200" fill="#ACA8A0"/>
  <rect x="740" y="90"  width="40" height="170" fill="#B0ACA4"/>

  <!-- Window grids on towers -->
  <g fill="#9C9890" opacity="0.5">
    <rect x="534" y="85" width="5" height="5"/><rect x="544" y="85" width="5" height="5"/>
    <rect x="534" y="96" width="5" height="5"/><rect x="544" y="96" width="5" height="5"/>
    <rect x="534" y="107" width="5" height="5"/><rect x="544" y="107" width="5" height="5"/>
    <rect x="534" y="118" width="5" height="5"/><rect x="544" y="118" width="5" height="5"/>
    <rect x="534" y="129" width="5" height="5"/><rect x="544" y="129" width="5" height="5"/>
  </g>

  <!-- Street vendor silhouette -->
  <rect x="140" y="370" width="8" height="30" fill="#8C8880"/>
  <rect x="130" y="355" width="28" height="18" fill="#A0988C"/>
  <ellipse cx="144" cy="368" rx="7" ry="7" fill="#8C8880"/>

</svg>
