<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#D8D0C4"/>
  <rect width="800" height="280" fill="#CCC4B8"/>

  <!-- Mercadão — neoclassical building -->
  <!-- Base / plinth -->
  <rect x="40" y="310" width="720" height="190" fill="#C4BCA8"/>
  <rect x="40" y="305" width="720" height="10" fill="#B8B0A0"/>

  <!-- Classical columns — colonnade -->
  <g fill="#C8C0B0">
    <rect x="60"  y="200" width="20" height="115"/>
    <rect x="105" y="200" width="20" height="115"/>
    <rect x="150" y="200" width="20" height="115"/>
    <rect x="195" y="200" width="20" height="115"/>
    <rect x="240" y="200" width="20" height="115"/>
    <rect x="285" y="200" width="20" height="115"/>
    <rect x="330" y="200" width="20" height="115"/>
    <rect x="375" y="200" width="20" height="115"/>
    <rect x="420" y="200" width="20" height="115"/>
    <rect x="465" y="200" width="20" height="115"/>
    <rect x="510" y="200" width="20" height="115"/>
    <rect x="555" y="200" width="20" height="115"/>
    <rect x="600" y="200" width="20" height="115"/>
    <rect x="645" y="200" width="20" height="115"/>
    <rect x="690" y="200" width="20" height="115"/>
    <rect x="720" y="200" width="20" height="115"/>
  </g>

  <!-- Column capitals (simple) -->
  <g fill="#B8B0A0">
    <rect x="55"  y="196" width="30" height="8"/>
    <rect x="100" y="196" width="30" height="8"/>
    <rect x="145" y="196" width="30" height="8"/>
    <rect x="190" y="196" width="30" height="8"/>
    <rect x="235" y="196" width="30" height="8"/>
    <rect x="280" y="196" width="30" height="8"/>
    <rect x="325" y="196" width="30" height="8"/>
    <rect x="370" y="196" width="30" height="8"/>
    <rect x="415" y="196" width="30" height="8"/>
    <rect x="460" y="196" width="30" height="8"/>
    <rect x="505" y="196" width="30" height="8"/>
    <rect x="550" y="196" width="30" height="8"/>
    <rect x="595" y="196" width="30" height="8"/>
    <rect x="640" y="196" width="30" height="8"/>
    <rect x="685" y="196" width="30" height="8"/>
    <rect x="715" y="196" width="30" height="8"/>
  </g>

  <!-- Entablature / frieze -->
  <rect x="40" y="180" width="720" height="20" fill="#BCB4A4"/>
  <rect x="40" y="175" width="720" height="8" fill="#B0A898"/>

  <!-- Pediment / triangular gable centre -->
  <polygon points="300,100 500,100 400,140" fill="#C0B8A8"/>
  <polygon points="310,108 490,108 400,138" fill="#C8C0B0" opacity="0.7"/>

  <!-- Stained glass windows (arched) hint -->
  <path d="M180,200 L180,280 Q210,300 240,280 L240,200 Z" fill="#A89880" opacity="0.5"/>
  <path d="M320,200 L320,285 Q355,305 390,285 L390,200 Z" fill="#8C9870" opacity="0.4"/>
  <path d="M410,200 L410,285 Q445,305 480,285 L480,200 Z" fill="#C4553A" opacity="0.3"/>
  <path d="M550,200 L550,280 Q580,300 610,280 L610,200 Z" fill="#A89880" opacity="0.5"/>

  <!-- Iron and glass ceiling roof (seen inside) -->
  <rect x="40" y="170" width="720" height="12" fill="#A8A498" opacity="0.6"/>

  <!-- Interior floor / stalls -->
  <rect x="40" y="360" width="720" height="140" fill="#BEB8A8"/>
  <!-- Stall colours -->
  <rect x="60"  y="355" width="90" height="20" fill="#B09878" opacity="0.8"/>
  <rect x="170" y="358" width="90" height="18" fill="#A88868" opacity="0.8"/>
  <rect x="280" y="354" width="100" height="22" fill="#B09878" opacity="0.8"/>
  <rect x="400" y="357" width="90" height="19" fill="#A88868" opacity="0.8"/>
  <rect x="510" y="355" width="90" height="20" fill="#B09878" opacity="0.8"/>
  <rect x="620" y="358" width="90" height="18" fill="#A88868" opacity="0.8"/>

  <!-- Market crowd (simplified silhouettes) -->
  <g fill="#7C7870">
    <rect x="80"  y="375" width="5" height="20"/><ellipse cx="82"  cy="372" rx="4" ry="5"/>
    <rect x="200" y="378" width="5" height="20"/><ellipse cx="202" cy="375" rx="4" ry="5"/>
    <rect x="320" y="372" width="5" height="20"/><ellipse cx="322" cy="369" rx="4" ry="5"/>
    <rect x="440" y="376" width="5" height="20"/><ellipse cx="442" cy="373" rx="4" ry="5"/>
    <rect x="550" y="374" width="5" height="20"/><ellipse cx="552" cy="371" rx="4" ry="5"/>
    <rect x="660" y="378" width="5" height="20"/><ellipse cx="662" cy="375" rx="4" ry="5"/>
  </g>

</svg>
