<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban Parallax — Two cities. One lens.</title>
  <meta name="description" content="A visual research blog comparing urban spaces across cities. Two columns. Two cities. One lens.">
  <link rel="icon" href="images/site/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/main.css">
  <!-- Theme applied before paint to avoid flash -->
  <script src="js/theme.js"></script>
</head>
<body>

  <!-- Theme Strip -->
  <div class="theme-strip" aria-label="Theme selector">
    <div class="theme-swatches">
      <button class="theme-swatch" data-theme="light"  title="Light"  style="background:#F4F4F2" onclick="applyTheme('light',  currentMood)"></button>
      <button class="theme-swatch" data-theme="dark"   title="Dark"   style="background:#1A1A18" onclick="applyTheme('dark',   currentMood)"></button>
    </div>
    <div class="theme-sep"></div>
    <div class="theme-swatches">
      <button class="theme-swatch" data-theme="red"    title="Red"    style="background:#C4553A" onclick="applyTheme('red',    currentMood)"></button>
      <button class="theme-swatch" data-theme="orange" title="Orange" style="background:#C88A30" onclick="applyTheme('orange', currentMood)"></button>
      <button class="theme-swatch" data-theme="green"  title="Green"  style="background:#5A8A4A" onclick="applyTheme('green',  currentMood)"></button>
      <button class="theme-swatch" data-theme="blue"   title="Blue"   style="background:#4A7AA0" onclick="applyTheme('blue',   currentMood)"></button>
    </div>
    <div class="theme-sep"></div>
    <button id="mood-toggle" onclick="toggleMood()" title="Toggle earthy / vivid">earthy</button>
  </div>

  <!-- Lens overlay -->
  <div class="up-lens-overlay" id="lensOverlay"></div>

  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-brand">
        <h1 class="site-title">URBAN PARALLAX</h1>
        <span class="site-tagline">two cities — one lens</span>
      </a>
      <nav class="header-nav">
        <a href="about.html">About</a>
      </nav>
    </div>
  </header>

  <main id="feed" class="feed" aria-label="Comparisons feed">
    <div class="feed-loading" aria-live="polite">Loading comparisons…</div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-mark">Urban Parallax</span>
      <span class="footer-credit">Rotterdam × São Paulo</span>
    </div>
  </footer>

  <!-- marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="js/blur-engine.js"></script>
  <script src="js/app.js"></script>
  <script>
    (() => {
      const header = document.querySelector('.site-header');
      window.addEventListener('scroll', () => {
        header.classList.toggle('scrolled', window.scrollY > 40);
      }, { passive: true });
    })();
  </script>
</body>
</html>
